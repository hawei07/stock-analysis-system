<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股票分析系统</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#f0f2f5;color:#333;min-height:100vh}
.header{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:22px;font-weight:600}
.header .stats{font-size:13px;opacity:.85}

.toolbar{display:flex;align-items:center;gap:12px;padding:16px 32px;background:#fff;border-bottom:1px solid #e8e8e8;flex-wrap:wrap}
.toolbar input,.toolbar select{padding:8px 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;outline:none;transition:border-color .2s}
.toolbar input:focus,.toolbar select:focus{border-color:#4a6cf7}
.toolbar input{width:240px}
.btn{padding:8px 18px;border:none;border-radius:6px;font-size:13px;cursor:pointer;transition:all .2s;font-weight:500}
.btn-primary{background:#4a6cf7;color:#fff}
.btn-primary:hover{background:#3b5de7}
.btn-success{background:#52c41a;color:#fff}
.btn-success:hover{background:#45b016}
.btn-danger{background:#ff4d4f;color:#fff}
.btn-danger:hover{background:#e04345}
.btn-outline{background:#fff;color:#4a6cf7;border:1px solid #4a6cf7}
.btn-outline:hover{background:#f0f5ff}
.btn-sm{padding:4px 12px;font-size:12px}
.btn-back{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.25);padding:6px 16px}
.btn-back:hover{background:rgba(255,255,255,.25)}

.view{display:none}
.view.active{display:block}

/* 列表页 */
.content{padding:24px 32px}
.table-wrap{background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
table{width:100%;border-collapse:collapse}
th{background:#fafafa;padding:12px 16px;text-align:left;font-weight:600;font-size:13px;color:#666;border-bottom:1px solid #f0f0f0;white-space:nowrap}
td{padding:12px 16px;font-size:13px;border-bottom:1px solid #f5f5f5}
tr:hover td{background:#fafbff}
.code{font-family:'Courier New',monospace;font-weight:600;color:#4a6cf7}
.name-link{color:#4a6cf7;cursor:pointer;text-decoration:none;font-weight:500}
.name-link:hover{text-decoration:underline;color:#3b5de7}
.market-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.market-SH{background:#ffeaea;color:#cf1322}
.market-SZ{background:#e6f7ff;color:#096dd9}
.market-BJ{background:#f6ffed;color:#389e0d}
.status-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px}
.status-正常{background:#f6ffed;color:#52c41a}
.status-ST{background:#fff7e6;color:#fa8c16}
.status-\*ST{background:#fff1f0;color:#ff4d4f}

.pagination{display:flex;align-items:center;justify-content:center;gap:8px;padding:20px}
.pagination button{padding:6px 14px;border:1px solid #d9d9d9;background:#fff;border-radius:6px;cursor:pointer;font-size:13px;transition:all .2s}
.pagination button:hover:not(:disabled){border-color:#4a6cf7;color:#4a6cf7}
.pagination button:disabled{opacity:.4;cursor:default}
.pagination .current{background:#4a6cf7;color:#fff;border-color:#4a6cf7}
.pagination .info{font-size:13px;color:#999}

/* 详情页 */
.detail-header{background:#fff;padding:20px 32px;border-bottom:1px solid #e8e8e8;display:flex;align-items:center;gap:16px}
.detail-stock-info{display:flex;align-items:center;gap:12px;flex:1}
.detail-stock-info .stock-code{font-family:'Courier New',monospace;font-size:20px;font-weight:700;color:#1a1a2e}
.detail-stock-info .stock-name{font-size:18px;font-weight:600}
.detail-stock-info .stock-meta{font-size:13px;color:#999}
.detail-stock-info .stock-meta span{margin-right:16px}

.tabs{display:flex;gap:0;background:#fff;border-bottom:2px solid #e8e8e8;padding:0 32px}
.tab-btn{padding:14px 24px;font-size:14px;font-weight:500;color:#666;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab-btn:hover{color:#4a6cf7}
.tab-btn.active{color:#4a6cf7;border-bottom-color:#4a6cf7}

.detail-content{padding:24px 32px}
.chart-container{background:#fff;border-radius:8px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.chart-box{width:100%;height:420px}

/* 弹窗 */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:12px;width:480px;max-width:90vw;box-shadow:0 8px 40px rgba(0,0,0,.15);overflow:hidden}
.modal-header{padding:16px 24px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center}
.modal-header h3{font-size:16px;font-weight:600}
.modal-close{cursor:pointer;font-size:20px;color:#999;line-height:1;background:none;border:none}
.modal-close:hover{color:#333}
.modal-body{padding:24px}
.modal-body label{display:block;margin-bottom:6px;font-size:13px;font-weight:500;color:#555}
.modal-body input,.modal-body select{width:100%;padding:10px 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;outline:none;margin-bottom:16px;transition:border-color .2s}
.modal-body input:focus,.modal-body select:focus{border-color:#4a6cf7}
.modal-body .row{display:flex;gap:16px}
.modal-body .row>*{flex:1}
.modal-footer{padding:16px 24px;display:flex;justify-content:flex-end;gap:12px;border-top:1px solid #f0f0f0}
.empty{text-align:center;padding:60px 20px;color:#999;font-size:14px}

.toast{position:fixed;top:24px;right:24px;padding:12px 24px;border-radius:8px;color:#fff;font-size:13px;z-index:200;transition:all .3s;opacity:0;transform:translateY(-10px)}
.toast.show{opacity:1;transform:translateY(0)}
.toast-success{background:#52c41a}
.toast-error{background:#ff4d4f}

#keyword{width:240px}

/* 自定义财报表格 */
.toolbar-row{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.toolbar-row label{font-size:13px;font-weight:500;color:#555}
.toolbar-row input,.toolbar-row select{padding:6px 10px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;outline:none}
.toolbar-row input:focus,.toolbar-row select:focus{border-color:#4a6cf7}
.toolbar-row input{width:80px}

.fin-table-wrap{overflow-x:auto;max-width:100%;background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);position:relative;max-height:70vh;overflow-y:auto}
.fin-table{border-collapse:collapse;min-width:100%;font-size:12px}
.fin-table th,.fin-table td{border:1px solid #e8e8e8;padding:6px 10px;text-align:right;white-space:nowrap}
.fin-table th{background:#f0f0f0;font-weight:600;font-size:12px;color:#333}
.fin-table td{background:#fff}
.fin-table .sticky-col{position:sticky;left:0;z-index:2;background:#fafafa;font-weight:500;text-align:left;min-width:180px}
.fin-table .sticky-header{position:sticky;top:0;z-index:3}
.fin-table thead th.sticky-col{z-index:4;background:#f0f0f0}
.fin-table .year-header{text-align:center;font-size:14px;background:#e6f0ff}
.fin-table .sub-header{font-size:11px;color:#666;text-align:center}
.fin-table .unit-row td{font-size:11px;color:#999;text-align:center;background:#fafafa;padding:4px 10px}

/* 数据行：原值列放大加粗 */
.fin-table tbody tr[data-indicator-field] td:not([class]){font-size:14px;font-weight:600;color:#222}
/* 同比列缩小 + 颜色编码：涨红跌绿 */
.fin-yoy-up{font-size:11px;background:#fff1f0!important;color:#cf1322!important}
.fin-yoy-down{font-size:11px;background:#f6ffed!important;color:#389e0d!important}
.fin-yoy-neutral{font-size:11px;color:#999}
.fin-table .indent-name{padding-left:20px}
.fin-table .sub-name{color:#888;font-size:11px}

/* 排序模式 */
.sort-mode-toggle{margin-left:12px;font-size:12px;padding:4px 12px}
.fin-table .sort-handle{display:none;width:28px;text-align:center;cursor:grab;user-select:none;font-size:16px;color:#999;vertical-align:middle}
.fin-table .sort-handle:active{cursor:grabbing}
.fin-table.sort-mode .sort-handle{display:table-cell}
.fin-table.sort-mode thead th.sticky-col{padding-left:28px}
body.reorder-active{user-select:none!important;-webkit-user-select:none!important}
.fin-table .reorder-ghost{position:fixed;pointer-events:none;z-index:999;opacity:.85;background:#e6f0ff;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.fin-table .reorder-ghost td{padding:6px 10px;white-space:nowrap;font-size:12px}
.fin-table .reorder-insert-marker{position:absolute;left:0;right:0;height:3px;background:#4a6cf7;pointer-events:none;z-index:998}
.fin-table.sort-mode tbody tr.sort-hover{border-top:3px solid #4a6cf7!important}

@media (max-width:768px){
  .fin-table .sticky-col{min-width:140px}
  .fin-table th,.fin-table td{padding:4px 6px;font-size:11px}
}
</style>
</head>
<body>

<!-- 头部：列表和详情共用 -->
<div class="header">
  <div style="display:flex;align-items:center;gap:16px">
    <h1 style="cursor:pointer" onclick="goList()">股票分析系统</h1>
    <button class="btn btn-back" id="btnBack" style="display:none" onclick="goList()">&larr; 返回列表</button>
  </div>
  <div class="stats" id="statsInfo">加载中...</div>
</div>

<!-- 列表页 -->
<div class="view active" id="view-list">
  <div class="toolbar">
    <input type="text" id="keyword" placeholder="搜索代码或名称..." onkeyup="debounceSearch()">
    <select id="filterMarket" onchange="loadStocks()">
      <option value="">全部市场</option>
      <option value="SH">上海 (SH)</option>
      <option value="SZ">深圳 (SZ)</option>
      <option value="BJ">北京 (BJ)</option>
    </select>
    <select id="filterStatus" onchange="loadStocks()">
      <option value="">全部状态</option>
      <option value="正常">正常</option>
      <option value="ST">ST</option>
      <option value="*ST">*ST</option>
    </select>
    <button class="btn btn-primary" onclick="openAddModal()">+ 添加股票</button>
    <button class="btn btn-success" id="btnUpdate" onclick="updateDividends()">⟳ 更新数据</button>
  </div>

  <div class="content">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>代码</th>
            <th>名称</th>
            <th>行业</th>
            <th>PE(TTM)</th>
            <th>股息率</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="stockTableBody"></tbody>
      </table>
      <div id="emptyHint" class="empty" style="display:none">暂无数据</div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>
</div>

<!-- 详情页 -->
<div class="view" id="view-detail">
  <div class="detail-header">
    <div class="detail-stock-info">
      <span class="stock-code" id="detailCode"></span>
      <span class="stock-name" id="detailName"></span>
      <span class="market-tag" id="detailMarket"></span>
      <span class="stock-meta">
        <span id="detailIndustry"></span>
        <span id="detailListDate"></span>
        <span id="detailStatus"></span>
      </span>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="dividends" onclick="switchTab('dividends')">分红</button>
    <button class="tab-btn" data-tab="financials" onclick="switchTab('financials')">自定义财报</button>
  </div>

  <div class="detail-content">
    <div class="tab-panel active" id="panel-dividends">
      <div class="chart-container">
        <h3 style="margin-bottom:16px;font-size:16px;font-weight:600">净利润、分红金额与分红比例</h3>
        <div class="chart-box" id="chartDividends"></div>
      </div>
    </div>
    <div class="tab-panel" id="panel-financials" style="display:none">
      <div class="toolbar-row">
        <label>年份范围：</label>
        <input type="number" id="finFromYear" value="2016" min="2000" max="2030" style="width:70px">
        <span style="font-size:13px">至</span>
        <input type="number" id="finToYear" value="2025" min="2000" max="2030" style="width:70px">
        <button class="btn btn-primary btn-sm" onclick="loadFinancials()">查询</button>
        <button class="btn btn-success btn-sm" onclick="updateFinancials()">更新数据</button>
        <button class="btn btn-outline btn-sm sort-mode-toggle" id="btnToggleSort" onclick="toggleSortMode()" style="display:none">调整排序</button>
        <span id="finStatus" style="font-size:12px;color:#999;margin-left:8px"></span>
      </div>
      <div class="fin-table-wrap" id="tableFinancialsWrap">
        <div class="empty" id="finEmpty">请点击"查询"加载财务数据</div>
      </div>
    </div>
  </div>
</div>

<!-- 添加/编辑弹窗 -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">添加股票</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editCode">
      <label>股票代码 *</label>
      <div style="display:flex;gap:8px">
        <input type="text" id="inputCode" placeholder="如 600519" maxlength="10" style="flex:1;margin-bottom:0" oninput="onCodeInput()">
        <button class="btn btn-outline btn-sm" id="btnLookup" onclick="lookupStock()" style="white-space:nowrap">查询</button>
      </div>
      <label style="margin-top:16px">股票名称</label>
      <input type="text" id="inputName" placeholder="自动获取" maxlength="50" readonly style="background:#f5f5f5">
      <label>市场</label>
      <input type="text" id="inputMarket" readonly style="background:#f5f5f5">
      <div class="row">
        <div>
          <label>状态</label>
          <select id="inputStatus"><option value="正常">正常</option><option value="ST">ST</option><option value="*ST">*ST</option></select>
        </div>
        <div>
          <label>行业</label>
          <input type="text" id="inputIndustry" placeholder="如 白酒">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="btnSave" onclick="saveStock()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let currentPage = 1;
let totalPages = 1;
let searchTimer = null;
let chartInstance = null;

// ==================== 路由 ====================

document.addEventListener('DOMContentLoaded', () => {
  const path = window.location.pathname;
  const match = path.match(/^\/stock\/(\d+)$/);
  if (match) {
    showDetailView(match[1]);
  } else {
    showListView();
    loadStocks();
    loadStats();
  }
  window.addEventListener('popstate', onPopState);
});

function onPopState() {
  const path = window.location.pathname;
  const match = path.match(/^\/stock\/(\d+)$/);
  if (match) {
    showDetailView(match[1]);
  } else {
    showListView();
    loadStocks();
    loadStats();
  }
}

function navigateTo(url) {
  history.pushState(null, '', url);
  const path = new URL(url, location.origin).pathname;
  const match = path.match(/^\/stock\/(\d+)$/);
  if (match) {
    showDetailView(match[1]);
  } else {
    showListView();
    loadStocks();
    loadStats();
  }
}

function goList() {
  navigateTo('/');
}

function showDetailView(code) {
  document.getElementById('view-list').classList.remove('active');
  document.getElementById('view-detail').classList.add('active');
  document.getElementById('btnBack').style.display = 'inline-block';
  // 重置到分红标签
  switchTab('dividends');
  loadDetail(code);
}

function showListView() {
  document.getElementById('view-detail').classList.remove('active');
  document.getElementById('view-list').classList.add('active');
  document.getElementById('btnBack').style.display = 'none';
}

// ==================== 详情页 ====================

async function loadDetail(code) {
  try {
    // 加载股票基本信息
    const stockRes = await fetch('/api/stock/' + code);
    const stock = await stockRes.json();
    if (stock.error) { showToast(stock.error, 'error'); goList(); return; }
    document.getElementById('detailCode').textContent = stock.code;
    document.getElementById('detailName').textContent = stock.name;
    document.getElementById('detailMarket').textContent = stock.market;
    document.getElementById('detailMarket').className = 'market-tag market-' + stock.market;
    document.getElementById('detailIndustry').textContent = stock.industry ? '行业: ' + stock.industry : '';
    document.getElementById('detailListDate').textContent = stock.list_date ? '上市: ' + stock.list_date : '';
    document.getElementById('detailStatus').innerHTML = '<span class="status-tag status-' + stock.status + '">' + stock.status + '</span>';

    // 加载分红数据并渲染图表
    loadDividends(code);
  } catch (e) {
    showToast('加载详情失败', 'error');
  }
}

async function loadDividends(code) {
  try {
    const res = await fetch('/api/stock/' + code + '/dividends');
    const data = await res.json();
    renderDividendsChart(data);
  } catch (e) {
    showToast('加载分红数据失败', 'error');
  }
}

function renderDividendsChart(data) {
  const dom = document.getElementById('chartDividends');
  if (!dom) return;
  if (chartInstance) chartInstance.dispose();

  const years = data.map(d => d.fiscal_year + '');
  const netProfits = data.map(d => d.net_profit);
  const dividends = data.map(d => d.dividend_amount);
  const payoutRatios = data.map(d => d.net_profit > 0 ? +(d.dividend_amount / d.net_profit * 100).toFixed(1) : null);

  chartInstance = echarts.init(dom);
  const option = {
    tooltip: {
      trigger: 'axis',
      axisPointer: { type: 'cross' },
      formatter: function(params) {
        const year = params[0].axisValue;
        let html = '<strong>' + year + '</strong><br/>';
        params.forEach(p => {
          if (p.seriesName === '分红比例') {
            html += p.marker + ' ' + p.seriesName + ': ' + (p.value !== null ? p.value + '%' : '-') + '<br/>';
          } else {
            html += p.marker + ' ' + p.seriesName + ': ' + (p.value !== null ? p.value.toFixed(2) + ' 亿元' : '-') + '<br/>';
          }
        });
        return html;
      }
    },
    legend: {
      data: ['净利润', '分红金额', '分红比例'],
      top: 4
    },
    grid: {
      left: 60,
      right: 80,
      top: 50,
      bottom: 40
    },
    xAxis: {
      type: 'category',
      data: years,
      name: '财年',
      axisLabel: { fontSize: 12 }
    },
    yAxis: [
      {
        type: 'value',
        name: '金额（亿元）',
        axisLabel: { fontSize: 12 }
      },
      {
        type: 'value',
        name: '分红比例（%）',
        axisLabel: { fontSize: 12 },
        splitLine: { show: false }
      }
    ],
    series: [
      {
        name: '净利润',
        type: 'bar',
        yAxisIndex: 0,
        data: netProfits,
        itemStyle: { color: '#4a6cf7', borderRadius: [4, 4, 0, 0] },
        label: {
          show: true,
          position: 'top',
          fontSize: 11,
          formatter: p => p.value >= 100 ? p.value.toFixed(0) : p.value.toFixed(2)
        }
      },
      {
        name: '分红金额',
        type: 'bar',
        yAxisIndex: 0,
        data: dividends,
        itemStyle: { color: '#52c41a', borderRadius: [4, 4, 0, 0] },
        label: {
          show: true,
          position: 'top',
          fontSize: 11,
          formatter: p => p.value >= 100 ? p.value.toFixed(0) : p.value.toFixed(2)
        }
      },
      {
        name: '分红比例',
        type: 'line',
        yAxisIndex: 1,
        data: payoutRatios,
        lineStyle: { color: '#fa8c16', width: 2.5 },
        itemStyle: { color: '#fa8c16' },
        symbol: 'circle',
        symbolSize: 6,
        label: {
          show: true,
          position: 'top',
          fontSize: 10,
          color: '#fa8c16',
          formatter: p => p.value !== null ? p.value + '%' : ''
        }
      }
    ]
  };
  chartInstance.setOption(option);
  window.addEventListener('resize', () => chartInstance && chartInstance.resize());
}

// ==================== 列表页 ====================

function debounceSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { currentPage = 1; loadStocks(); }, 400);
}

async function loadStocks() {
  const keyword = document.getElementById('keyword').value.trim();
  const market = document.getElementById('filterMarket').value;
  const status = document.getElementById('filterStatus').value;
  const params = new URLSearchParams({ page: currentPage, page_size: 15 });
  if (market) params.append('market', market);
  if (status) params.append('status', status);
  if (keyword) params.append('keyword', keyword);

  try {
    const res = await fetch('/api/stocks?' + params);
    const data = await res.json();
    renderTable(data.data);
    totalPages = data.total_pages;
    renderPagination(data);
    document.getElementById('emptyHint').style.display = data.total === 0 ? 'block' : 'none';
  } catch (e) {
    showToast('加载失败', 'error');
  }
}

function renderTable(stocks) {
  const tbody = document.getElementById('stockTableBody');
  tbody.innerHTML = stocks.map(s => `
    <tr>
      <td><span class="code">${esc(s.code)}</span></td>
      <td><a class="name-link" onclick="navigateTo('/stock/${esc(s.code)}');return false" href="/stock/${esc(s.code)}">${esc(s.name)}</a></td>
      <td>${esc(s.industry || '-')}</td>
      <td>${s.pe_ttm != null ? Number(s.pe_ttm).toFixed(2) : '-'}</td>
      <td>${s.dividend_yield != null ? Number(s.dividend_yield).toFixed(2) + '%' : '-'}</td>
      <td>
        <button class="btn btn-outline btn-sm" onclick="openEditModal('${esc(s.code)}')">编辑</button>
        <button class="btn btn-danger btn-sm" onclick="deleteStock('${esc(s.code)}','${esc(s.name)}')">删除</button>
      </td>
    </tr>
  `).join('');
}

function renderPagination(data) {
  const pg = document.getElementById('pagination');
  let html = `<span class="info">共 ${data.total} 条 / ${data.total_pages} 页</span>`;
  html += `<button ${data.page <= 1 ? 'disabled' : ''} onclick="goPage(${data.page - 1})">上一页</button>`;
  const start = Math.max(1, data.page - 2);
  const end = Math.min(data.total_pages, data.page + 2);
  for (let i = start; i <= end; i++) {
    html += `<button class="${i === data.page ? 'current' : ''}" onclick="goPage(${i})">${i}</button>`;
  }
  html += `<button ${data.page >= data.total_pages ? 'disabled' : ''} onclick="goPage(${data.page + 1})">下一页</button>`;
  pg.innerHTML = html;
}

function goPage(p) { currentPage = p; loadStocks(); }

async function loadStats() {
  try {
    const res = await fetch('/api/stats');
    const data = await res.json();
    document.getElementById('statsInfo').textContent = `共 ${data.total} 只股票 | SH:${data.markets.SH} SZ:${data.markets.SZ} BJ:${data.markets.BJ}`;

}

function openAddModal() {
  document.getElementById('modalTitle').textContent = '添加股票';
  document.getElementById('editCode').value = '';
  document.getElementById('inputCode').value = '';
  document.getElementById('inputCode').disabled = false;
  document.getElementById('inputName').value = '';
  document.getElementById('inputMarket').value = '';
  document.getElementById('inputStatus').value = '正常';
  document.getElementById('inputIndustry').value = '';
  document.getElementById('btnLookup').style.display = 'inline-block';
  document.getElementById('modal').classList.add('active');
}

async function openEditModal(code) {
  try {
    const res = await fetch('/api/stock/' + code);
    const s = await res.json();
    if (s.error) { showToast(s.error, 'error'); return; }
    document.getElementById('modalTitle').textContent = '编辑股票';
    document.getElementById('editCode').value = s.code;
    document.getElementById('inputCode').value = s.code;
    document.getElementById('inputCode').disabled = true;
    document.getElementById('inputName').value = s.name;
    document.getElementById('inputMarket').value = s.market;
    document.getElementById('inputStatus').value = s.status;
    document.getElementById('inputIndustry').value = s.industry || '';
    document.getElementById('btnLookup').style.display = 'none';
    document.getElementById('modal').classList.add('active');
  } catch (e) { showToast('获取股票信息失败', 'error'); }
}

function onCodeInput() {
  document.getElementById('inputName').value = '';
  document.getElementById('inputMarket').value = '';
}

async function lookupStock() {
  const code = document.getElementById('inputCode').value.trim();
  if (!code) { showToast('请输入股票代码', 'error'); return; }
  const btn = document.getElementById('btnLookup');
  btn.disabled = true;
  btn.textContent = '查询中...';
  try {
    const res = await fetch('/api/stock-info/' + code);
    const data = await res.json();
    if (data.error) {
      showToast(data.error, 'error');
    } else {
      document.getElementById('inputName').value = data.name;
      document.getElementById('inputMarket').value = data.market;
      showToast('已识别: ' + data.name, 'success');
    }
  } catch (e) {
    showToast('查询失败', 'error');
  }
  btn.disabled = false;
  btn.textContent = '查询';
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

async function saveStock() {
  const editCode = document.getElementById('editCode').value;
  const isEdit = !!editCode;

  const code = document.getElementById('inputCode').value.trim();
  const name = document.getElementById('inputName').value.trim();
  const market = document.getElementById('inputMarket').value.trim();
  const status = document.getElementById('inputStatus').value;
  const industry = document.getElementById('inputIndustry').value.trim();

  if (!code) {
    showToast('请输入股票代码', 'error'); return;
  }

  const body = { code, name, market, status, industry: industry || null };
  const url = isEdit ? '/api/stock/' + editCode : '/api/stock';
  const method = isEdit ? 'PUT' : 'POST';

  try {
    const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const data = await res.json();
    if (data.success) {
      showToast(isEdit ? '更新成功' : '添加成功', 'success');
      closeModal();
      loadStocks();
      loadStats();
    } else {
      showToast(data.error || '操作失败', 'error');
    }
  } catch (e) {
    showToast('请求失败', 'error');
  }
}

async function deleteStock(code, name) {
  if (!confirm(`确认删除 ${code} ${name}？`)) return;
  try {
    const res = await fetch('/api/stock/' + code, { method: 'DELETE' });
    const data = await res.json();
    if (data.success) {
      showToast('删除成功', 'success');
      loadStocks();
      loadStats();
    } else {
      showToast(data.error || '删除失败', 'error');
    }
  } catch (e) { showToast('请求失败', 'error'); }
}

  document.querySelector('[data-tab="' + name + '"]').classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');

async function loadFinancials() {
  const code = document.getElementById('detailCode').textContent.trim();
  if (!code) return;
  const from = document.getElementById('finFromYear').value;
  const to = document.getElementById('finToYear').value;
  const wrap = document.getElementById('tableFinancialsWrap');
  const empty = document.getElementById('finEmpty');
  wrap.innerHTML = '<div class="empty">加载中...</div>';

  try {
    const res = await fetch(`/api/stock/${code}/financials?from_year=${from}&to_year=${to}`);
    const data = await res.json();
    if (!data || data.length === 0) {
      wrap.innerHTML = '<div class="empty">暂无财务数据，请点击"更新数据"拉取</div>';
      return;
    }
    renderFinancialsTable(data);
  } catch (e) {
    wrap.innerHTML = '<div class="empty" style="color:#ff4d4f">加载失败: ' + e.message + '</div>';
  }
}

function renderFinancialsTable(data) {
  const wrap = document.getElementById('tableFinancialsWrap');
  const years = data.map(d => d.fiscal_year).sort((a, b) => b - a);

  // 计算同比
  const yoyMap = {};
  for (let i = 0; i < data.length; i++) {
    const d = data[i];
    const prev = data.find(p => p.fiscal_year === d.fiscal_year - 1);
    yoyMap[d.fiscal_year] = {};
    const fields = ['total_revenue', 'operate_profit', 'parent_profit', 'deducted_profit',
                    'operate_cashflow', 'roe', 'deducted_roe', 'roic',
                    'total_assets', 'total_equity', 'total_shares',
                    'core_profit_rate', 'net_profit_rate', 'cashflow_to_profit'];
    for (const f of fields) {
      const cur = d[f];
      if (cur == null) { yoyMap[d.fiscal_year][f] = null; continue; }
      if (!prev || prev[f] == null || prev[f] === 0) { yoyMap[d.fiscal_year][f] = null; continue; }
      yoyMap[d.fiscal_year][f] = (cur - prev[f]) / Math.abs(prev[f]) * 100;
    }
  }

  // 指标定义：name, field, unit, isPercent, showYoy
  const indicators = [
    { name: '营业总收入', field: 'total_revenue', unit: '亿元', isPercent: false, showYoy: true },
    { name: '核心利润（营业利润）', field: 'operate_profit', unit: '亿元', isPercent: false, showYoy: true },
    { name: '核心利润率', field: 'core_profit_rate', unit: '%', isPercent: true, showYoy: true },
    { name: '归母净利润', field: 'parent_profit', unit: '亿元', isPercent: false, showYoy: true },
    { name: '扣非净利润', field: 'deducted_profit', unit: '亿元', isPercent: false, showYoy: true },
    { name: '净利润率', field: 'net_profit_rate', unit: '%', isPercent: true, showYoy: true },
    { name: '经营现金流/净利润', field: 'cashflow_to_profit', unit: '%', isPercent: true, showYoy: true },
    { name: 'ROE', field: 'roe', unit: '%', isPercent: true, showYoy: true },
    { name: '扣非ROE', field: 'deducted_roe', unit: '%', isPercent: true, showYoy: true },
    { name: 'ROIC', field: 'roic', unit: '%', isPercent: true, showYoy: true },
    { name: '经营活动现金流量净额', field: 'operate_cashflow', unit: '亿元', isPercent: false, showYoy: true },
    { name: '总资产', field: 'total_assets', unit: '亿元', isPercent: false, showYoy: true },
    { name: '归母权益', field: 'total_equity', unit: '亿元', isPercent: false, showYoy: true },
    { name: '总股本', field: 'total_shares', unit: '亿股', isPercent: false, showYoy: true },
    { name: '审计意见', field: 'audit_opinion', unit: '', isPercent: false, showYoy: false },
  ];

  // 从 localStorage 恢复排序
  const savedOrder = localStorage.getItem('financials-indicator-order');
  if (savedOrder) {
    try {
      const orderFields = JSON.parse(savedOrder);
      const idxMap = {};
      indicators.forEach((ind, i) => idxMap[ind.field] = i);
      indicators.sort((a, b) => {
        const ai = orderFields.indexOf(a.field), bi = orderFields.indexOf(b.field);
        if (ai === -1 && bi === -1) return idxMap[a.field] - idxMap[b.field];
        if (ai === -1) return 1;
        if (bi === -1) return -1;
        return ai - bi;
      });
    } catch (e) {}
  }
  // 暴露到全局，供排序模式使用
  window._finIndicators = indicators;

  // 构建表格
  let html = '<table class="fin-table" id="finMainTable"><thead><tr>';
  // 排序手柄列（默认隐藏）+ 指标列 + 年份
  html += '<th class="sort-handle sticky-header" rowspan="2" style="min-width:28px;background:#f0f0f0"></th>';
  html += '<th class="sticky-col sticky-header" rowspan="2" style="min-width:180px">指标</th>';
  for (const y of years) {
    html += `<th class="sticky-header year-header" colspan="2">${y}</th>`;
  }
  html += '</tr><tr>';
  // 第2行表头：每年两个子列（手柄列占位）
  for (const y of years) {
    html += '<th class="sticky-header sub-header">原值</th>';
    html += '<th class="sticky-header sub-header">同比%</th>';
  }
  html += '</tr></thead><tbody>';

  // 单位行
  html += '<tr class="unit-row"><td class="sort-handle" style="background:#fafafa"></td><td class="sticky-col" style="background:#fafafa;font-weight:500">单位</td>';
  for (const y of years) {
    html += `<td style="text-align:center;background:#fafafa">-</td>`;
    html += `<td style="text-align:center;background:#fafafa">%</td>`;
  }
  html += '</tr>';

  // 数据行
  const dataMap = {};
  for (const d of data) dataMap[d.fiscal_year] = d;

  for (const ind of indicators) {
    html += `<tr data-indicator-field="${ind.field}"><td class="sort-handle">⋮⋮</td><td class="sticky-col">${ind.name}</td>`;
    for (const y of years) {
      const d = dataMap[y];
      const val = d ? d[ind.field] : null;
      const yoy = yoyMap[y] ? yoyMap[y][ind.field] : null;

      if (!ind.showYoy) {
        // 审计意见：只显示原值
        const display = val || '-';
        html += `<td style="text-align:left">${display}</td><td>-</td>`;
      } else {
        let display = '-';
        if (val != null) {
          if (ind.isPercent || ind.unit === '%') {
            display = val.toFixed(2);
          } else if (ind.unit === '亿元' || ind.unit === '亿股') {
            display = val >= 100 ? val.toFixed(0) : val.toFixed(2);
          } else {
            display = val.toFixed(2);
          }
          if (ind.unit) display += ' ' + ind.unit;
        }
        html += `<td>${display}</td>`;

        // 同比列
        let yoyClass = 'fin-yoy-neutral';
        let yoyDisplay = '-';
        if (yoy != null) {
          yoyDisplay = yoy.toFixed(1) + '%';
          if (yoy > 0) yoyClass = 'fin-yoy-up';
          else if (yoy < 0) yoyClass = 'fin-yoy-down';
        }
        html += `<td class="${yoyClass}">${yoyDisplay}</td>`;
      }
    }
    html += '</tr>';
  }

  html += '</tbody></table>';
  wrap.innerHTML = html;

  // 显示排序按钮
  const btnSort = document.getElementById('btnToggleSort');
  if (btnSort) btnSort.style.display = 'inline-block';

  // 绑定拖拽排序事件（mousedown/mousemove/mouseup 实现）
  attachReorderEvents(wrap);
}

// ==================== 排序模式 ====================

let _reorderState = null; // { table, tbody, rows, dragRow, ghost, marker, startY, rowHeight, dragIdx }

function toggleSortMode() {
  const table = document.getElementById('finMainTable');
  if (!table) return;
  const btn = document.getElementById('btnToggleSort');
  const isActive = table.classList.contains('sort-mode');

  if (isActive) {
    // 退出排序模式
    table.classList.remove('sort-mode');
    btn.textContent = '调整排序';
    btn.classList.remove('btn-primary');
    btn.classList.add('btn-outline');
    // 清除残留状态
    document.body.classList.remove('reorder-active');
    if (_reorderState) {
      if (_reorderState.ghost) _reorderState.ghost.remove();
      if (_reorderState.marker) _reorderState.marker.remove();
      _reorderState = null;
    }
  } else {
    // 进入排序模式
    table.classList.add('sort-mode');
    btn.textContent = '完成排序';
    btn.classList.remove('btn-outline');
    btn.classList.add('btn-primary');
  }
}

function attachReorderEvents(wrap) {
  const table = document.getElementById('finMainTable');
  if (!table) return;
  const tbody = table.querySelector('tbody');
  if (!tbody) return;

  // 每次渲染后重新绑定
  tbody.removeEventListener('mousedown', _onSortMouseDown);
  tbody.addEventListener('mousedown', _onSortMouseDown);
}

function _onSortMouseDown(e) {
  const table = document.getElementById('finMainTable');
  if (!table || !table.classList.contains('sort-mode')) return;

  // 找到排序手柄
  const handle = e.target.closest('.sort-handle');
  if (!handle) return;
  const row = handle.closest('tr');
  if (!row || !row.dataset.indicatorField) return;

  e.preventDefault();
  document.body.classList.add('reorder-active');

  const tbody = table.querySelector('tbody');
  const rows = Array.from(tbody.querySelectorAll('tr[data-indicator-field]'));
  const dragIdx = rows.indexOf(row);
  const rect = row.getBoundingClientRect();
  const rowHeight = rect.height;
  const startY = e.clientY;
  let curIdx = dragIdx;
  let moveY = startY;

  // 创建 ghost
  const ghost = row.cloneNode(true);
  ghost.classList.add('reorder-ghost');
  ghost.style.width = rect.width + 'px';
  ghost.style.left = rect.left + 'px';
  ghost.style.top = rect.top + 'px';
  document.body.appendChild(ghost);

  // 创建插入标记
  const marker = document.createElement('div');
  marker.classList.add('reorder-insert-marker');
  document.body.appendChild(marker);

  // 高亮被拖拽行
  row.style.opacity = '0.3';

  _reorderState = { table, tbody, rows, dragRow: row, ghost, marker, startY, rowHeight, dragIdx };

  function onMove(ev) {
    moveY = ev.clientY;
    const dy = moveY - startY;
    ghost.style.top = (rect.top + dy) + 'px';

    // 计算目标索引
    const offset = Math.round(dy / rowHeight);
    let targetIdx = dragIdx + offset;
    targetIdx = Math.max(0, Math.min(targetIdx, rows.length - 1));

    if (targetIdx !== curIdx) {
      curIdx = targetIdx;
      // 移动标记
      const targetRow = rows[targetIdx];
      const tr = targetRow.getBoundingClientRect();
      const insertBefore = offset < 0 || (offset === 0 && dy < 0);
      marker.style.top = (insertBefore ? tr.top : tr.bottom - 3) + 'px';
      marker.style.left = tr.left + 'px';
      marker.style.width = tr.width + 'px';
      marker.style.display = 'block';

      // 高亮目标行
      rows.forEach(r => r.classList.remove('sort-hover'));
      rows[targetIdx].classList.add('sort-hover');
    }
  }

  function onUp() {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.body.classList.remove('reorder-active');

    ghost.remove();
    marker.remove();
    row.style.opacity = '';
    rows.forEach(r => r.classList.remove('sort-hover'));

    if (curIdx !== dragIdx && curIdx >= 0 && curIdx < rows.length) {
      const targetRow = rows[curIdx];
      if (curIdx < dragIdx) {
        tbody.insertBefore(row, targetRow);
      } else {
        tbody.insertBefore(row, targetRow.nextSibling);
      }
      // 保存新顺序
      const newRows = tbody.querySelectorAll('tr[data-indicator-field]');
      const newOrder = Array.from(newRows).map(r => r.dataset.indicatorField);
      localStorage.setItem('financials-indicator-order', JSON.stringify(newOrder));
      // 更新全局 indicators
      if (window._finIndicators) {
        const fieldMap = {};
        window._finIndicators.forEach(ind => fieldMap[ind.field] = ind);
        window._finIndicators.length = 0;
        newOrder.forEach(f => { if (fieldMap[f]) window._finIndicators.push(fieldMap[f]); });
      }
    }

    _reorderState = null;
  }

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

async function updateFinancials() {
  const code = document.getElementById('detailCode').textContent.trim();
  const statusEl = document.getElementById('finStatus');
  statusEl.textContent = '正在更新数据，请稍候...';
  statusEl.style.color = '#1890ff';

  try {
    const res = await fetch('/api/update-financials', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode: 'incremental' })
    });
    const data = await res.json();
    if (data.success) {
      statusEl.textContent = `更新完成: ${data.records_updated} 条记录 (${data.stocks_processed} 只股票)`;
      statusEl.style.color = '#52c41a';
      // 重新加载
      loadFinancials();
    } else {
      statusEl.textContent = '更新失败: ' + (data.error || '未知错误');
      statusEl.style.color = '#ff4d4f';
    }
  } catch (e) {
    statusEl.textContent = '请求失败: ' + e.message;
    statusEl.style.color = '#ff4d4f';
  }
}

function updateDividends() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay active';
  overlay.innerHTML = `
    <div class="modal" style="width:360px">
      <div class="modal-header">
        <h3>选择更新模式</h3>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body" style="text-align:center;padding:32px 24px">
        <p style="margin-bottom:20px;color:#666;font-size:14px">增量更新：仅补全缺失年份的数据（快速）<br>全量更新：重新获取所有历史数据（较慢）</p>
      </div>
      <div class="modal-footer" style="justify-content:center;gap:16px">
        <button class="btn btn-outline" id="btnIncremental">增量更新</button>
        <button class="btn btn-primary" id="btnFull">全量更新</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  const close = () => overlay.remove();
  overlay.querySelector('.modal-close').onclick = close;
  overlay.onclick = e => { if (e.target === overlay) close(); };

  overlay.querySelector('#btnIncremental').onclick = () => { close(); doUpdate('incremental'); };
  overlay.querySelector('#btnFull').onclick = () => { close(); doUpdate('full'); };
}

async function doUpdate(mode) {
  const modeLabel = mode === 'incremental' ? '增量更新' : '全量更新';
  const btn = document.getElementById('btnUpdate');
  btn.disabled = true;
  btn.textContent = '⟳ 更新中...';
  showToast(`正在${modeLabel}，请稍候...`, 'success');
  try {
    const res = await fetch('/api/update-dividends', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode })
    });
    const data = await res.json();
    if (data.success) {
      showToast(`${modeLabel}完成: ${data.message}（${data.stocks_processed} 只股票）`, 'success');
    } else {
      showToast('更新失败: ' + (data.error || '未知错误'), 'error');
    }
  } catch (e) {
    showToast('网络请求失败', 'error');
  }
  btn.disabled = false;
  btn.textContent = '⟳ 更新数据';
}

function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
